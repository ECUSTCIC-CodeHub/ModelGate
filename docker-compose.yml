services:
  modelgate:
    image: docker.cnb.cool/ecustcic/modelgate:latest
    container_name: modelgate
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-me-to-a-random-string}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-to-another-random-string}
      - TZ=Asia/Shanghai
      # 日志保留天数，超过自动清理；设为 0 关闭（默认 30）
      # - LOG_RETENTION_DAYS=30
      # - AUTH_DISABLED=1
      # MySQL 模式（取消注释并填写以下配置）
      # - DB_DRIVER=mysql
      # - MYSQL_HOST=mysql
      # - MYSQL_PORT=3306
      # - MYSQL_USER=root
      # - MYSQL_PASSWORD=your-password
      # - MYSQL_DATABASE=modelgate
    volumes:
      - modelgate-data:/app/data

volumes:
  modelgate-data:
