.build: &build
  services:
    - name: docker
      options:
        rootlessBuildkitd:
          enabled: true
  env:
    IMAGE: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}
  stages:
    - name: docker build & push
      script: |
        docker buildx build \
          --cache-from type=registry,ref=${IMAGE}:latest-cache-amd64 \
          --cache-from type=registry,ref=${IMAGE}:latest-cache-arm64 \
          --cache-to type=registry,ref=${IMAGE}:latest-cache-amd64,mode=max \
          --cache-to type=registry,ref=${IMAGE}:latest-cache-arm64,mode=max \
          -t ${IMAGE}:latest -t ${IMAGE}:${CNB_BRANCH} \
          --platform linux/amd64,linux/arm64 --push .

.push: &push
  stages:
    - name: auto-tag
      image: cnbcool/git-auto-tag:latest
      settings:
        blockWhenFail: false
        branch: $CNB_BRANCH
        repoUrlHttps: $CNB_REPO_URL_HTTPS
      exports:
        tag: NEW_TAG
    - name: show tag
      script: echo $NEW_TAG

main:
  push:
    - *push
  "crontab: 0 */1 * * *":
    - stages:
        - name: sync upstream
          image: cnbcool/git-sync:latest
          settings:
            source: https://cnb.cool/Bring/Tools/ModelGate
            target: $CNB_REPO_URL_HTTPS
            branch: main
            sync_mode: rebase
            push_tags: true

$:
  vscode:
    - docker:
        image: docker.cnb.cool/scaffold/examples/nodejs:latest
      services:
        - vscode
        - docker
  tag_push:
    - *build
